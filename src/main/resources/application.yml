spring:
    datasource:
        url: jdbc:mysql://localhost:3306/motocatalogdb
        username: develop
        password: develop
        driver-class-name: com.mysql.cj.jdbc.Driver
    sql:
        init:
            mode: never
            encoding: UTF-8
    profiles:
        active: test
        
logging:
    level:
        root: info
    file:
        name: app.log
    logback:
        rollingpolicy:
            max-file-size: 1MB
mybatis:
    configuration:
         map-underscore-to-camel-case: true
         

